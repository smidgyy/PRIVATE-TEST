<script>
const input = document.getElementById('puzzle-input');
const response = document.getElementById('response');
const container = document.querySelector('.textarea-container');
const title = document.getElementById('main-title');
const subtitle = document.getElementById('subtitle');
let busy = false;

let currentStep = 1;
let userId = 'session_managed';

async function fetchUserState() {
  try {
    const res = await fetch('/api/userState');
    if (!res.ok) return 1;
    const contentType = res.headers.get("content-type");
    if (!contentType || !contentType.includes("application/json")) return 1;
    const data = await res.json();
    return data.node02_step || 1;
  } catch (e) {
    console.error("Failed to fetch user state:", e);
    return 1;
  }
}

function playBlowSound() {
  if (window.soundManager) {
    window.soundManager.playBlowSound();
  }
}

function playFlintSound() {
  if (window.soundManager) {
    window.soundManager.playFlintSound();
  }
}

function initPhase() {
  console.log("Rendering Node02 section for step:", currentStep);
  
  // Ensure we start fresh
  document.body.classList.remove('phase-2', 'phase-3', 'light-mode');
  
  // Fallback for elements
  let titleEl = document.getElementById('main-title');
  let subtitleEl = document.getElementById('subtitle');
  
  if (!titleEl || !subtitleEl) {
      console.log("Missing UI elements, but continuing");
      const container = document.getElementById('content');
      if (container) {
          container.innerHTML = `
            <div class="title" id="main-title">The First Trial.</div>
            <div class="subtitle" id="subtitle">Many have tried. The door remains sealed.</div>
            <div class="field-wrap">
              <div class="textarea-container">
                <input type="text" id="puzzle-input" autocomplete="off" spellcheck="false" placeholder="">
                <div class="response" id="response"></div>
              </div>
            </div>
          `;
          titleEl = document.getElementById('main-title');
          subtitleEl = document.getElementById('subtitle');
      }
  }

  if (currentStep === 2) {
    if (titleEl) titleEl.textContent = "The Voynich Marginalia.";
    if (subtitleEl) subtitleEl.textContent = "The Frenchman holds the key.";
    document.body.classList.add('phase-2');
    if (window.soundManager) window.soundManager.startFireCrackling();
  } else if (currentStep === 3) {
    document.body.classList.add('phase-3');
    startPhase3();
  } else {
    // Default to Step 1
    if (titleEl) titleEl.textContent = "The First Trial.";
    if (subtitleEl) subtitleEl.textContent = "Many have tried. The door remains sealed.";
  }
}

async function hashInput(str) {
  const msgUint8 = new TextEncoder().encode(str);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function startBlackFire() {
  const canvas = document.createElement('canvas');
  canvas.style.position = 'fixed';
  canvas.style.bottom = '0';
  canvas.style.left = '0';
  canvas.style.width = '100vw';
  canvas.style.height = '100vh';
  canvas.style.zIndex = '900';
  canvas.style.pointerEvents = 'none';
  canvas.style.imageRendering = 'pixelated';
  document.body.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  const fireWidth = Math.floor(window.innerWidth / 6);
  const fireHeight = Math.floor(window.innerHeight / 6);
  canvas.width = fireWidth;
  canvas.height = fireHeight;

  const firePixels = new Array(fireWidth * fireHeight).fill(0);

  const palette = [];
  for (let i = 0; i < 36; i++) {
    if (i === 0) {
      palette[i] = { r: 0, g: 0, b: 0, a: 0 };
    } else if (i < 15) {
      // Grey flames
      const color = 40 + i * 5; 
      palette[i] = { r: color, g: color, b: color, a: 255 };
    } else {
      // Pitch black
      palette[i] = { r: 0, g: 0, b: 0, a: 255 };
    }
  }

  const fireSourceY = new Array(fireWidth).fill(fireHeight - 1);
  const fireSpeeds = new Array(fireWidth);
  const baseSpeed = fireHeight / 1000; // 0.6x speed, adjusted for 30fps
  for(let i=0; i<fireWidth; i++) {
    fireSpeeds[i] = baseSpeed * (0.8 + Math.random() * 0.4);
  }

  // Involve the bonfire
  const bonfire = document.getElementById('bonfire-container');
  let bonfireX = fireWidth / 2;
  let bonfireY = fireHeight - 10;
  if (bonfire) {
    const rect = bonfire.getBoundingClientRect();
    bonfireX = Math.floor((rect.left + rect.width / 2) / 6);
    bonfireY = Math.floor((rect.top + rect.height / 2) / 6);
    
    const flamesGroup = bonfire.querySelector('#flames');
    if (flamesGroup) flamesGroup.style.display = 'block';
    bonfire.style.zIndex = '899';
    
    // Ignite the floor under the bonfire immediately
    for (let x = 0; x < fireWidth; x++) {
      const dist = Math.abs(x - bonfireX);
      if (dist < 12) {
        fireSourceY[x] = fireHeight - 1 - (12 - dist) * 0.5;
        fireSpeeds[x] = baseSpeed * 2; // Spreads slightly faster around the bonfire initially
      }
    }
  }

  function doFire() {
    for (let x = 0; x < fireWidth; x++) {
      for (let y = 1; y < fireHeight; y++) {
        const src = y * fireWidth + x;
        const pixel = firePixels[src];
        if (pixel === 0) {
          firePixels[src - fireWidth] = 0;
        } else {
          const spread = Math.round(Math.random() * 5) - 2;
          const dstX = x + spread;
          if (dstX >= 0 && dstX < fireWidth) {
            const decay = Math.random() < 0.15 ? 1 : 0;
            firePixels[(y - 1) * fireWidth + dstX] = Math.max(0, pixel - decay);
          }
        }
      }
    }
  }

  function drawFire() {
    const imgData = ctx.createImageData(fireWidth, fireHeight);
    for (let i = 0; i < firePixels.length; i++) {
      const p = palette[firePixels[i]];
      if (p) {
        imgData.data[i * 4] = p.r;
        imgData.data[i * 4 + 1] = p.g;
        imgData.data[i * 4 + 2] = p.b;
        imgData.data[i * 4 + 3] = p.a;
      }
    }
    ctx.putImageData(imgData, 0, 0);
  }

  const intervalId = setInterval(() => {
    let allFilled = true;
    for (let x = 0; x < fireWidth; x++) {
      let sy = Math.floor(fireSourceY[x]);
      if (sy > 0) allFilled = false;
      if (sy < 0) sy = 0;
      firePixels[sy * fireWidth + x] = 35;
      for (let y = sy + 1; y < fireHeight; y++) {
        firePixels[y * fireWidth + x] = 35;
      }
    }

    doFire();
    drawFire();

    // Bonfire emits grey flames
    if (bonfireY > 0) {
      for(let i=0; i<10; i++) {
        const bx = bonfireX + Math.floor(Math.random() * 20) - 10;
        const by = bonfireY + Math.floor(Math.random() * 10) - 5;
        if (bx >= 0 && bx < fireWidth && by >= 0 && by < fireHeight) {
           firePixels[by * fireWidth + bx] = 14;
        }
      }
    }

    for (let x = 0; x < fireWidth; x++) {
      if (fireSourceY[x] > 0) {
        fireSourceY[x] -= fireSpeeds[x];
        if (Math.random() < 0.05) {
          fireSpeeds[x] = baseSpeed * (0.8 + Math.random() * 0.4);
        }
      }
      
      if (x > 0 && fireSourceY[x - 1] < fireSourceY[x] - 2) {
        fireSourceY[x] -= baseSpeed;
      }
      if (x < fireWidth - 1 && fireSourceY[x + 1] < fireSourceY[x] - 2) {
        fireSourceY[x] -= baseSpeed;
      }
    }

    if (allFilled) {
      clearInterval(intervalId);
      // Ensure the canvas is completely black
      ctx.fillStyle = 'black';
      ctx.fillRect(0, 0, fireWidth, fireHeight);
      
      fetch('/api/validateCommand', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'unlock_node03_secret' })
      }).then(res => {
        if (!res.ok) throw new Error("Server error");
        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) throw new Error("Invalid response");
        return res.json();
      }).then(data => {
        if (data.message) {
          response.textContent = data.message;
        }
      });
    }
  }, 33);
}

async function dissolveAndRespond() {
  const text = input.value.trim().toLowerCase();
  if (busy || !text) return;
  busy = true;

  if (window.soundManager) window.soundManager.playDissolve();

  input.classList.add('hidden');

  let charLayer = document.createElement('div');
  charLayer.className = 'char-layer';
  text.split('').forEach(c => {
    const span = document.createElement('span');
    span.className = 'char';
    span.textContent = c === ' ' ? '\u00a0' : c;
    charLayer.appendChild(span);
  });
  container.appendChild(charLayer);

  const allChars = charLayer.querySelectorAll('.char');
  const indices = Array.from({length: allChars.length}, (_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  indices.forEach((idx, order) => {
    setTimeout(() => { allChars[idx].classList.add('dissolve'); }, order * 40 + Math.random() * 60);
  });
  
  const totalDissolveTime = indices.length * 50 + 600;

  await new Promise(r => setTimeout(r, totalDissolveTime));
  charLayer.style.opacity = '0';

  try {
    const res = await fetch('/api/validateCommand', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input: text, type: 'node02_answer', step: currentStep.toString() })
    });
    if (!res.ok) {
      console.error("Server error:", res.status);
      busy = false;
      input.classList.remove('hidden');
      return;
    }
    const contentType = res.headers.get("content-type");
    if (!contentType || !contentType.includes("application/json")) {
      console.error("Unexpected response format:", contentType);
      busy = false;
      input.classList.remove('hidden');
      return;
    }
    const data = await res.json();
    
    let msg = data.message || "Incorrect. The truth eludes you.";
    let success = data.status === 'success';

    if (success) {
      msg = data.msg;
      if (data.action === 'open_article') {
        if (window.soundManager) window.soundManager.playSuccess();
        currentStep = 2;
        // Automatically advance to the article as requested via backend route
        if (window.parent && window.parent.openBrowserUrl) {
          window.parent.openBrowserUrl('archive://node/02/article');
        } else {
          // Fallback if not in iframe
          window.location.href = 'article.html';
        }
      } else if (data.action === 'phase2_success') {
        if (window.soundManager) {
          window.soundManager.playSuccess();
          window.soundManager.stopFireCrackling();
        }
        currentStep = 3;
        
        // Extinguish the flame immediately
        document.body.classList.remove('phase-2');
        document.body.classList.add('phase-3');
        playBlowSound();
        
        // Smooth fade out of text after reading it
        setTimeout(() => {
          if (title) title.style.transition = 'opacity 1.5s ease';
          if (subtitle) subtitle.style.transition = 'opacity 1.5s ease';
          if (response) response.style.transition = 'opacity 1.5s ease';
          if (title) title.style.opacity = '0';
          if (subtitle) subtitle.style.opacity = '0';
          if (response) response.style.opacity = '0';
        }, 2000);

        setTimeout(() => { startPhase3(true); }, 4500);
      } else if (data.action === 'phase3_success') {
        if (window.soundManager) window.soundManager.playSuccess();
        setTimeout(() => {
          if (window.soundManager) window.soundManager.startBlackFire();
          startBlackFire();
        }, 5000);
      }
    }

    if (!success && window.soundManager) window.soundManager.playError();

    if (response) response.textContent = msg;
    if (response) response.style.opacity = '1';

    setTimeout(() => {
      charLayer.remove();
      if (!success) {
        if (response) response.style.opacity = '0';
        input.value = '';
        input.classList.remove('hidden');
        input.focus();
      }
      busy = false;
    }, 3000);
  } catch (err) {
    console.error(err);
    busy = false;
  }
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); dissolveAndRespond(); }
});

function startPhase3(isTransition = false) {
  currentStep = 3;
  document.body.classList.add('phase-3');
  input.value = '';
  input.classList.add('hidden');
  
  setTimeout(() => {
    document.getElementById('flashlight-overlay').classList.add('active');
  }, isTransition ? 0 : 0);

  const canvas = document.getElementById('void-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  
  let dotX = canvas.width * (15 + Math.random() * 70) / 100;
  let dotY = canvas.height * (15 + Math.random() * 70) / 100;
  let dotActive = false;

  console.log("%c[SYSTEM WARNING]", "color: red; font-size: 20px; font-weight: bold;");
  console.log("%cThe Void cannot be parsed. The spark exists outside the DOM.", "color: #8b7355; font-size: 14px;");
  console.log("%cPut away your tools. Rely on your eyes.", "color: #666; font-style: italic;");

  setTimeout(() => {
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(dotX, dotY, 2, 0, Math.PI * 2);
    ctx.fill();
    dotActive = true;
  }, isTransition ? 2000 : 500);
  
  let btn = null;
  document.addEventListener('mousemove', (e) => {
    const flashlight = document.getElementById('flashlight-overlay');
    if (flashlight) {
      flashlight.style.setProperty('--x', e.clientX + 'px');
      flashlight.style.setProperty('--y', e.clientY + 'px');
    }

    if (!dotActive || currentStep !== 3) return;
    
    const dx = e.clientX - dotX;
    const dy = e.clientY - dotY;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 6) {
      if (!btn) {
        btn = document.createElement('button');
        btn.className = 'n-act';
        btn.textContent = '[ IGNITE ]';
        btn.style.left = (dotX + 4) + 'px';
        btn.style.top = (dotY - 10) + 'px';
        
        btn.addEventListener('contextmenu', (ev) => {
          ev.preventDefault();
          btn.classList.remove('visible');
          setTimeout(() => { if (btn && btn.parentNode) btn.remove(); btn = null; }, 300);
        });
        
        let igniteClicks = 0;
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          playFlintSound();
          igniteClicks++;
          
          if (igniteClicks < 3) {
            btn.style.transform = 'scale(0.9) translateY(0)';
            setTimeout(() => btn.style.transform = '', 150);
            return;
          }

          document.body.classList.add('light-mode');
          btn.remove();
          canvas.remove();
          title.innerHTML = 'The <a href="https://en.wikipedia.org/wiki/Light" target="_blank" style="color: inherit; text-decoration: none; cursor: pointer;">Light</a>.';
          subtitle.textContent = "What was hidden is revealed.";
          input.value = '';
          response.textContent = '';
          input.classList.remove('hidden');
          input.focus();
        });
        
        document.body.appendChild(btn);
        requestAnimationFrame(() => {
          if (btn) btn.classList.add('visible');
        });
      }
    } else if (btn) {
      const rect = btn.getBoundingClientRect();
      const isOverBtn = e.clientX >= rect.left - 5 && e.clientX <= rect.right + 5 &&
                        e.clientY >= rect.top - 5 && e.clientY <= rect.bottom + 5;
      if (!isOverBtn && dist > 15) {
        btn.classList.remove('visible');
        const oldBtn = btn;
        btn = null;
        setTimeout(() => { if (oldBtn.parentNode) oldBtn.remove(); }, 300);
      }
    }
  });

  document.addEventListener('contextmenu', (e) => {
    if (currentStep === 3) e.preventDefault();
  });

  setTimeout(() => {
    if (title) title.textContent = "The Void.";
    if (subtitle) subtitle.textContent = "Find the spark.";
    if (title) title.style.transition = 'opacity 3s ease';
    if (subtitle) subtitle.style.transition = 'opacity 3s ease';
    if (title) title.style.opacity = '1';
    if (subtitle) subtitle.style.opacity = '1';
    
    // Add random glitch sounds in the void
    const glitchInterval = setInterval(() => {
      if (currentStep === 3 && !document.body.classList.contains('light-mode')) {
        if (Math.random() < 0.2 && window.soundManager) {
          window.soundManager.playGlitch();
        }
      } else {
        clearInterval(glitchInterval);
      }
    }, 3000);
  }, isTransition ? 3000 : 100);
}

// Subtle console initialization
setTimeout(() => {
  console.log('%c[TEST]%c initialized', 'color:#8b7355;font-weight:bold;', 'color:#444;');
}, 2000);

document.addEventListener("DOMContentLoaded", async () => {
  currentStep = await fetchUserState();
  initPhase();
  if (!input.classList.contains('hidden')) input.focus();
});
document.addEventListener('click', () => {
  if (!input.classList.contains('hidden')) input.focus();
});
</script>
<script src="/sound-manager.js?v=2"></script>
