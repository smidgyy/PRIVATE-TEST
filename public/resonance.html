<!DOCTYPE html>
<html lang="en">
<head>
<script src="/auth-init.js"></script>
<script type="module" src="/main.js"></script>
<script>
if (window === window.top) {
  window.location.href = 'stage1.html';
} else {
  document.addEventListener('DOMContentLoaded', () => {
    const checkAccess = async () => {
      const userId = window.ensureUserId();
      try {
        const res = await fetch('/api/validateCommand?userId=' + userId, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'check_access', target: 'resonance', userId })
        });
        const data = await res.json();
        if (data.status !== 'success') {
          document.documentElement.innerHTML = '<body style="background:#000;color:#f00;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;margin:0;"><div><h1>ACCESS DENIED</h1><p>Node authentication required.</p></div></body>';
          setTimeout(function(){ window.top.location.href = 'stage1.html'; }, 3000);
        } else {
          document.getElementById('content').style.display = 'flex';
        }
      } catch (err) {
        console.error(err);
      }
    };
    checkAccess();
  });
}
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resonance Data</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=VT323&family=Pixelify+Sans:wght@400;500;600;700&display=swap');
  body { 
    background: #050505; 
    color: #00ffcc; 
    font-family: 'JetBrains Mono', monospace; 
    padding: 0; 
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  #content { display: none; flex-direction: column; width: 100%; height: 100%; }

  /* Scanlines effect */
  body::before {
    content: " ";
    display: block;
    position: absolute;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    z-index: 100;
    background-size: 100% 2px, 3px 100%;
    pointer-events: none;
  }

  header {
    padding: 1rem 2rem;
    border-bottom: 1px solid rgba(0, 255, 204, 0.2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0, 10, 10, 0.8);
    backdrop-filter: blur(5px);
    z-index: 50;
  }

  .status-tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border: 1px solid #00ffcc;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 2rem;
    position: relative;
    z-index: 10;
  }

  .data-container {
    width: 100%;
    max-width: 600px;
    background: rgba(0, 20, 20, 0.4);
    border: 1px solid rgba(0, 255, 204, 0.3);
    padding: 2rem;
    border-radius: 8px;
    position: relative;
    box-shadow: 0 0 40px rgba(0, 255, 204, 0.05);
  }

  .data-container::before {
    content: "RESONANCE_DATA_STREAM";
    position: absolute;
    top: -10px;
    left: 20px;
    background: #050505;
    padding: 0 10px;
    font-size: 0.6rem;
    color: rgba(0, 255, 204, 0.6);
  }

  .json-block {
    font-size: 0.9rem;
    line-height: 1.6;
    color: #00ffcc;
    text-shadow: 0 0 5px rgba(0, 255, 204, 0.5);
  }

  .json-key { color: rgba(0, 255, 204, 0.6); }
  .json-string { color: #fff; word-break: break-all; }

  #visualizer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-around;
    opacity: 0.15;
    z-index: 1;
    pointer-events: none;
  }

  .bar {
    width: 2px;
    background: linear-gradient(to top, transparent, #00ffcc, transparent);
    height: 10%;
    transition: height 0.05s ease;
  }

  .circle-decoration {
    position: absolute;
    border: 1px solid rgba(0, 255, 204, 0.1);
    border-radius: 50%;
    pointer-events: none;
  }

  .hint-text {
    position: absolute;
    bottom: 2rem;
    right: 2rem;
    font-size: 0.6rem;
    color: rgba(0, 255, 204, 0.3);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="content">
  <header>
    <div style="font-weight: bold; letter-spacing: 2px;">AURORA // NODE_02</div>
    <div class="status-tag">Signal Aligned</div>
  </header>

  <div id="visualizer"></div>
  
  <!-- Circles for the puzzle hint -->
  <div class="circle-decoration" style="width: 300px; height: 300px; top: -150px; left: -150px;"></div>
  <div class="circle-decoration" style="width: 200px; height: 200px; bottom: -100px; right: -100px;"></div>
  <div class="circle-decoration" style="width: 100px; height: 100px; top: 20%; right: 10%;"></div>

  <main>
    <div class="data-container">
      <div class="json-block">
        {<br>
        &nbsp;&nbsp;<span class="json-key">"status"</span>: <span class="json-string">"aligned"</span>,<br>
        &nbsp;&nbsp;<span class="json-key">"data"</span>: <span class="json-string">"U2hpZnQgdGhlIGNoYXJhY3RlcnMgb2YgJ0tGRE9CQUwnIGJ5IHRoZSBudW1iZXIgb2YgY2lyY2xlcyBpbiB0aGlzIHBhZ2Uu"</span>,<br>
        &nbsp;&nbsp;<span class="json-key">"source"</span>: <span class="json-string">"digitalpuzzles.fun/resonance.html"</span><br>
        }
      </div>
    </div>
  </main>

  <div class="hint-text">Frequency: 432Hz // Resonance: Active</div>

  <script src="/sound-manager.js?v=2"></script>
  <script>
    // Visualizer Logic
    const NUM_BARS = 128;
    const visualizer = document.getElementById('visualizer');
    const bars = [];
    
    for (let i = 0; i < NUM_BARS; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      visualizer.appendChild(bar);
      bars.push(bar);
    }

    function animateVisualizer() {
      const time = Date.now() / 1000;
      bars.forEach((bar, i) => {
        const height = 5 + Math.abs(Math.sin(time * 1.5 + i * 0.1)) * 60 + Math.random() * 5;
        bar.style.height = height + '%';
        bar.style.opacity = (height / 70) * 0.5;
      });
      
      requestAnimationFrame(animateVisualizer);
    }

    animateVisualizer();
  </script>
</div>
</body>
</html>
