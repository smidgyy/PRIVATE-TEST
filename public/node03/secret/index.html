<!DOCTYPE html>
<html lang="en">
<head>
<script src="/auth-init.js"></script>
<script type="module" src="/main.js"></script>
<script>
if (window === window.top) {
  // If accessed directly, the backend should have handled the access check.
  // If we're here, either access is granted or it's a direct hit.
} else {
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch('/api/validateCommand', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'check_access', target: 'node03_secret' })
      });
      if (!res.ok) throw new Error("Server error");
      const contentType = res.headers.get("content-type");
      if (!contentType || !contentType.includes("application/json")) throw new Error("Invalid response");
      const data = await res.json();
      if (data.status === 'success') {
        document.getElementById('content').style.display = 'block';
      } else {
        document.documentElement.innerHTML = '<body style="background:#000;color:#f00;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;margin:0;"><div><h1>ACCESS DENIED</h1><p>Archive fragment locked.</p></div></body>';
      }
    } catch (e) {
      document.documentElement.innerHTML = '<body style="background:#000;color:#f00;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;margin:0;"><div><h1>ERROR</h1><p>Connection failed.</p></div></body>';
    }
  });
}
</script>
<meta charset="UTF-8">
<style>
  body { background: #000; color: #c4c0b8; font-family: 'VT323', monospace; margin: 0; padding: 0; }
</style>
</head>
<body>
  <button onclick="resetProgress()" style="position: fixed; top: 10px; right: 10px; z-index: 9999; background: #ff4444; color: white; border: 1px solid #000; padding: 2px 5px; cursor: pointer; font-size: 10px; font-weight: bold; box-shadow: 1px 1px 0 #fff inset, -1px -1px 0 #888 inset;" title="Reset all progress">DEV RESET</button>
  <div id="content" style="display:none;">
    <div style="padding: 4rem 2rem; text-align: center;">
      <!-- greed always reveals the crown -->
      <h2 style="font-size: 2rem; color: #8b7355; margin-bottom: 2rem; letter-spacing: 0.1em;">ARCHIVE FRAGMENT RECOVERED</h2>
      <div style="font-size: 2.5rem; letter-spacing: 0.3em; color: #e0dcd0;">13-15-14-5-25</div>
    </div>
  </div>
</body>
</html>
