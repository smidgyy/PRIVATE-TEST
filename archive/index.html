<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT ARCHIVE ACCESS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #000;
            --text: #0f0;
            --glow: rgba(0, 255, 0, 0.3);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 2rem;
            border: 1px solid var(--text);
            box-shadow: 0 0 20px var(--glow);
            background: rgba(0, 20, 0, 0.8);
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .message {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 2rem;
        }

        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 100;
        }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 10px 20px;
            border: 1px solid var(--text);
            color: var(--text);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--text);
            color: var(--bg);
            box-shadow: 0 0 10px var(--text);
        }
    </style>
</head>
<body>
    <div class="glitch-overlay"></div>
    <div class="container">
        <h1>ROOT ARCHIVE UNLOCKED</h1>
        <div class="message">
            <p>Congratulations, Investigator.</p>
            <p>You have successfully bypassed the Aurora OS security layers and accessed the Root Archive.</p>
            <p>The truth is now yours to witness.</p>
        </div>
        <div class="status">
            IDENTITY VERIFIED: [REDACTED]<br>
            ACCESS LEVEL: OMEGA<br>
            SYSTEM STATUS: STABLE
        </div>
        <a href="/" class="btn">Return to System</a>
    </div>
</body>
</html>
