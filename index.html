<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
    
    :root {
      --bg: #050505;
      --text: #e0e0e0;
      --glow: rgba(255, 255, 255, 0.15);
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Scanlines */
    body::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    /* Vignette */
    body::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.8) 150%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      text-shadow: 0 0 5px var(--glow);
      animation: flicker 0.15s infinite;
      letter-spacing: 0.05em;
    }

    .error-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      margin-bottom: 1rem;
      position: relative;
      display: inline-block;
    }

    .error-title::after {
      content: "ERROR 404";
      position: absolute;
      left: 2px;
      text-shadow: -1px 0 red;
      top: 0;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
      clip: rect(0, 900px, 0, 0);
      animation: noise-anim 2s infinite linear alternate-reverse;
    }

    a {
      color: inherit;
      text-decoration: none;
      cursor: default;
      position: relative;
    }

    @keyframes flicker {
      0% { opacity: 0.95; }
      50% { opacity: 1; }
      100% { opacity: 0.98; }
    }

    @keyframes noise-anim {
      0% { clip: rect(13px, 9999px, 44px, 0); }
      5% { clip: rect(83px, 9999px, 99px, 0); }
      10% { clip: rect(42px, 9999px, 89px, 0); }
      15% { clip: rect(90px, 9999px, 34px, 0); }
      20% { clip: rect(22px, 9999px, 12px, 0); }
      25% { clip: rect(61px, 9999px, 88px, 0); }
      30% { clip: rect(11px, 9999px, 55px, 0); }
      35% { clip: rect(74px, 9999px, 33px, 0); }
      40% { clip: rect(33px, 9999px, 91px, 0); }
      45% { clip: rect(88px, 9999px, 22px, 0); }
      50% { clip: rect(55px, 9999px, 77px, 0); }
      55% { clip: rect(99px, 9999px, 11px, 0); }
      60% { clip: rect(44px, 9999px, 66px, 0); }
      65% { clip: rect(22px, 9999px, 44px, 0); }
      70% { clip: rect(77px, 9999px, 88px, 0); }
      75% { clip: rect(11px, 9999px, 22px, 0); }
      80% { clip: rect(66px, 9999px, 99px, 0); }
      85% { clip: rect(33px, 9999px, 55px, 0); }
      90% { clip: rect(88px, 9999px, 11px, 0); }
      95% { clip: rect(55px, 9999px, 33px, 0); }
      100% { clip: rect(99px, 9999px, 77px, 0); }
    }
  </style>
</head>
<body>
  <!-- curiosity is required -->
  <div class="container">
    <div class="error-title">ERROR 404</div>
    <div>This page does not exist.</div>
    <div>You are not supposed to be <a href="stage1.html">here</a>.</div>
  </div>
  <script src="/sound-manager.js"></script>
  <script>
    setInterval(() => {
      if (Math.random() < 0.1) {
        if (window.soundManager) window.soundManager.playGlitch();
      }
    }, 2000);
  </script>
</body>
</html>
