<!DOCTYPE html>
<html lang="en">
<head>
<script type="module" src="/main.ts"></script>
<script>
if (window === window.top) {
  window.location.href = '/stage1.html';
} else {
  // We will check access via backend once Firebase is ready
  document.addEventListener('DOMContentLoaded', () => {
    const checkAccess = async () => {
      // Wait for firebase auth to be ready
      let retries = 0;
      while (!window.firebaseAuth?.currentUser && retries < 20) {
        await new Promise(r => setTimeout(r, 100));
        retries++;
      }
      
      const userId = window.firebaseAuth?.currentUser?.uid || 'anonymous';
      try {
        const res = await fetch('/api/validateCommand', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'check_access', target: 'node03_secret', userId })
        });
        const data = await res.json();
        if (data.status !== 'success') {
          document.documentElement.innerHTML = '<body style="background:#000;color:#f00;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;margin:0;"><div><h1>ACCESS DENIED</h1><p>Archive fragment locked.</p></div></body>';
          setTimeout(function(){ window.top.location.href = '/stage1.html'; }, 3000);
        } else {
          document.getElementById('content').style.display = 'block';
        }
      } catch (err) {
        console.error(err);
      }
    };
    checkAccess();
  });
}
</script>
<meta charset="UTF-8">
<style>
  body { background: #000; color: #c4c0b8; font-family: 'VT323', monospace; margin: 0; padding: 0; }
  #content { display: none; }
</style>
</head>
<body>
  <div id="content" style="padding: 4rem 2rem; text-align: center;">
    <script>
      document.currentScript.parentNode.insertBefore(document.createComment(String.fromCharCode(103,114,101,101,100,32,97,108,119,97,121,115,32,114,101,118,101,97,108,115,32,116,104,101,32,99,114,111,119,110)), document.currentScript);
    </script>
    <h2 style="font-size: 2rem; color: #8b7355; margin-bottom: 2rem; letter-spacing: 0.1em;">ARCHIVE FRAGMENT RECOVERED</h2>
    <div style="font-size: 2.5rem; letter-spacing: 0.3em; color: #e0dcd0;">13-15-14-5-25</div>
  </div>
</body>
</html>
