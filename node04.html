<!DOCTYPE html>
<html lang="en">
<head>
<script>
if (window === window.top) {
  window.location.href = '/stage1.html';
} else {
  let unlocked = false;
  try {
    const t = localStorage.getItem('aurora_stage3_token_complete');
    if (t && atob(t) === 'true|AURORA_OS_SECRET') unlocked = true;
  } catch(e) {}
  if (!unlocked) {
    document.documentElement.innerHTML = '<body style="background:#000;color:#f00;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;margin:0;"><div><h1>ACCESS DENIED</h1><p>Node authentication required.</p></div></body>';
    setTimeout(function(){ window.top.location.href = '/stage1.html'; }, 3000);
    throw new Error('Access Denied');
  }
}

window.onload = function() {
  if (window.parent && typeof window.parent.startStage4 === 'function') {
    window.parent.startStage4();
  }
};
</script>
<meta charset="UTF-8">
<style>
  body { background: #000; color: #0f0; font-family: 'VT323', monospace; margin: 0; padding: 0; overflow: hidden; }
  @keyframes glitch {
    0% { transform: translate(0) }
    20% { transform: translate(-2px, 2px) }
    40% { transform: translate(-2px, -2px) }
    60% { transform: translate(2px, 2px) }
    80% { transform: translate(2px, -2px) }
    100% { transform: translate(0) }
  }
  .corrupted {
    animation: glitch 0.3s infinite;
    color: #f00;
    text-shadow: 2px 0 #0f0, -2px 0 #00f;
  }
</style>
</head>
<body>
  <div style="padding: 4rem 2rem; text-align: center;">
    <h2 class="corrupted" style="font-size: 2.5rem; letter-spacing: 0.1em;">ARCHIVE NODE 04</h2>
    <p class="corrupted" style="font-size: 1.5rem;">Memory corruption detected.</p>
  </div>
</body>
</html>
