<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #000; color: #d4d0c8; font-family: Georgia, 'Times New Roman', serif; overflow: hidden; }
body { display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 1s ease, color 1s ease; }

.title { font-size: 1.6rem; letter-spacing: 0.04em; margin-bottom: 1.5rem; opacity: 0; animation: fadeIn 2s ease forwards; }
.subtitle { font-size: 0.8rem; color: #666; letter-spacing: 0.06em; margin-bottom: 2.5rem; opacity: 0; animation: fadeIn 2s ease 2s forwards; text-align: center; }

.field-wrap { position: relative; width: min(480px, 85vw); opacity: 0; animation: fadeIn 2s ease 1s forwards; }
.textarea-container { position: relative; width: 100%; height: 60px; }
input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; border: none; border-bottom: 1px solid #333; color: #d4d0c8; font-family: Georgia, 'Times New Roman', serif; font-size: 1.2rem; text-align: center; outline: none; transition: border-color 0.6s ease, opacity 0.3s ease; letter-spacing: 0.1em; }
input:focus { border-color: #8b7355; }
input.hidden { opacity: 0; pointer-events: none; }

.response { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; opacity: 0; font-style: italic; color: #8b7355; font-size: 0.95rem; letter-spacing: 0.03em; transition: opacity 1s ease; text-align: center; }

.char-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-family: Georgia, 'Times New Roman', serif; font-size: 1.2rem; color: #d4d0c8; pointer-events: none; transition: opacity 0.5s ease; letter-spacing: 0.1em; }
.char { display: inline-block; transition: all 1.2s ease; }
.char.dissolve { opacity: 0; transform: translateY(-30px) scale(0.3); filter: blur(4px); color: #8b7355; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Phase 3 Mechanics */
#flashlight-overlay {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background: radial-gradient(circle 60px at var(--x, 50%) var(--y, 50%), transparent 0%, rgba(0,0,0,0.99) 80%);
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2s ease;
}
#flashlight-overlay.active { opacity: 1; }

/* Phase 2 Bonfire */
#glow-overlay {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background: radial-gradient(circle at 50% 100%, rgba(226, 88, 34, 0.15) 0%, transparent 60%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.5s ease;
  z-index: 1;
}
body.phase-2 #glow-overlay { opacity: 1; }

#bonfire-container {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 128px;
  height: 128px;
  display: none;
  z-index: 10;
}
body.phase-2 #bonfire-container, body.phase-3 #bonfire-container { display: block; }
body.phase-3 #flames { display: none; }

#void-canvas {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: 45; pointer-events: none; display: none;
}
body.phase-3 #void-canvas { display: block; }

.n-act {
  position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
  background: transparent; border: 1px solid #8b7355; color: #8b7355;
  font-family: Georgia, 'Times New Roman', serif; font-size: 0.9rem; letter-spacing: 0.2em;
  padding: 0.5rem 1rem; cursor: pointer; z-index: 60; transition: all 0.3s ease;
}
.n-act:hover { background: #8b7355; color: #000; }

body.light-mode { background: #e5e0d8; color: #111; }
body.light-mode input { color: #111; border-color: #999; }
body.light-mode .subtitle { color: #555; }
body.light-mode #flashlight-overlay { display: none; }
body.light-mode #flames { display: block !important; }
body.light-mode #flames rect[fill="#ac3232"] { fill: #555 !important; }
body.light-mode #flames rect[fill="#df7126"] { fill: #333 !important; }
body.light-mode #flames rect[fill="#fbf236"] { fill: #111 !important; }
body.light-mode #flames rect[fill="#ffffff"] { fill: #000 !important; }

.hidden-clue { display: none; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); font-size: 1.2rem; letter-spacing: 0.1em; color: #111; opacity: 0; transition: opacity 2s ease; }
body.light-mode .hidden-clue { display: block; opacity: 1; }

.hidden-svg { position: fixed; top: -100px; left: -100px; opacity: 0; pointer-events: none; }
</style>
</head>

<script>
const input = document.getElementById('puzzle-input');
const response = document.getElementById('response');
const container = document.querySelector('.textarea-container');
const title = document.getElementById('main-title');
const subtitle = document.getElementById('subtitle');
let busy = false;

let phase = localStorage.getItem('stage1_phase') || '1';

function playBlowSound() {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const ctx = new AudioContext();
    const bufferSize = ctx.sampleRate * 1.0;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(300, ctx.currentTime);
    filter.frequency.linearRampToValueAtTime(50, ctx.currentTime + 0.8);

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);

    noise.start();
    noise.stop(ctx.currentTime + 1.0);
  } catch (e) {
    console.error("Audio not supported");
  }
}

function playFlintSound() {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const ctx = new AudioContext();
    
    const osc = ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(4000, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(8000, ctx.currentTime + 0.05);
    
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
    
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    osc.start();
    osc.stop(ctx.currentTime + 0.1);
    
    const bufferSize = ctx.sampleRate * 0.1;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.value = 5000;
    
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.5, ctx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
    
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(ctx.destination);
    
    noise.start();
    noise.stop(ctx.currentTime + 0.1);
  } catch (e) {
    console.error("Audio not supported");
  }
}

function initPhase() {
  if (phase === '2') {
    title.textContent = "The Voynich Marginalia.";
    subtitle.textContent = "The Frenchman holds the key.";
    document.body.classList.add('phase-2');
  } else if (phase === '3') {
    document.body.classList.add('phase-3');
    startPhase3();
  }
}

async function hashInput(str) {
  const msgUint8 = new TextEncoder().encode(str);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function dissolveAndRespond() {
  const text = input.value.trim().toLowerCase();
  if (busy || !text) return;
  busy = true;

  input.classList.add('hidden');

  let charLayer = document.createElement('div');
  charLayer.className = 'char-layer';
  text.split('').forEach(c => {
    const span = document.createElement('span');
    span.className = 'char';
    span.textContent = c === ' ' ? '\u00a0' : c;
    charLayer.appendChild(span);
  });
  container.appendChild(charLayer);

  const allChars = charLayer.querySelectorAll('.char');
  const indices = Array.from({length: allChars.length}, (_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  indices.forEach((idx, order) => {
    setTimeout(() => { allChars[idx].classList.add('dissolve'); }, order * 40 + Math.random() * 60);
  });
  
  const totalDissolveTime = indices.length * 50 + 600;

  await new Promise(r => setTimeout(r, totalDissolveTime));
  charLayer.style.opacity = '0';

  const h = await hashInput(text);
  let msg = "Incorrect. The truth eludes you.";
  let success = false;

  if (phase === '1' && h === '76576de1cea42a163eb4c35c9af35ad3c3a9b6a1d67ed93f6f99e81ba96d5e22') {
    msg = "The earth opens. Seek the marginalia.";
    success = true;
    localStorage.setItem('stage1_phase', '2');
    setTimeout(() => { window.location.href = 'article.html'; }, 3000);
  } 
  else if (phase === '2' && h === 'ba6f8ed6d0d150b2a2ab2bebe99540f8c00cafb0ebdbf71a6f0b768c45425ca7') {
    msg = "The flame is extinguished.";
    success = true;
    phase = '3';
    localStorage.setItem('stage1_phase', '3');
    
    // Extinguish the flame immediately
    document.body.classList.remove('phase-2');
    document.body.classList.add('phase-3');
    playBlowSound();
    
    // Smooth fade out of text after reading it
    setTimeout(() => {
      title.style.transition = 'opacity 1.5s ease';
      subtitle.style.transition = 'opacity 1.5s ease';
      response.style.transition = 'opacity 1.5s ease';
      title.style.opacity = '0';
      subtitle.style.opacity = '0';
      response.style.opacity = '0';
    }, 2000);

    setTimeout(() => { startPhase3(true); }, 4500);
  }
  else if (phase === '3' && h === 'f4938d9a4604c814224528a58f8eae902fb47cb9776b26334f147505f0929199') {
    msg = "Opus Magnum.";
    success = true;
    setTimeout(() => {
      title.style.transition = 'opacity 3s ease';
      title.style.opacity = '0';
      subtitle.style.transition = 'opacity 3s ease';
      subtitle.style.opacity = '0';
      document.getElementById('hidden-clue').style.opacity = '0';
      setTimeout(() => {
        title.textContent = 'The door is open.';
        title.style.opacity = '1';
        subtitle.textContent = 'You have passed the test.';
        subtitle.style.opacity = '1';
      }, 3000);
    }, 2000);
  }

  response.textContent = msg;
  response.style.opacity = '1';

  setTimeout(() => {
    charLayer.remove();
    if (!success) {
      response.style.opacity = '0';
      input.value = '';
      input.classList.remove('hidden');
      input.focus();
    }
    busy = false;
  }, 3000);
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); dissolveAndRespond(); }
});

function startPhase3(isTransition = false) {
  phase = '3';
  document.body.classList.add('phase-3');
  input.classList.add('hidden');
  
  setTimeout(() => {
    document.getElementById('flashlight-overlay').classList.add('active');
  }, isTransition ? 0 : 0);

  const canvas = document.getElementById('void-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  
  let dotX = canvas.width * (15 + Math.random() * 70) / 100;
  let dotY = canvas.height * (15 + Math.random() * 70) / 100;
  let dotActive = false;

  setTimeout(() => {
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(dotX, dotY, 2, 0, Math.PI * 2);
    ctx.fill();
    dotActive = true;
  }, isTransition ? 2000 : 500);
  
  document.addEventListener('mousemove', (e) => {
    document.getElementById('flashlight-overlay').style.setProperty('--x', e.clientX + 'px');
    document.getElementById('flashlight-overlay').style.setProperty('--y', e.clientY + 'px');
  });

  document.addEventListener('click', (e) => {
    if (!dotActive || document.querySelector('.n-act') || phase !== '3') return;
    
    const dx = e.clientX - dotX;
    const dy = e.clientY - dotY;
    if (Math.sqrt(dx*dx + dy*dy) < 20) {
      const btn = document.createElement('button');
      btn.className = 'n-act';
      btn.textContent = '[ IGNITE ]';
      
      let igniteClicks = 0;
      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        playFlintSound();
        igniteClicks++;
        
        if (igniteClicks < 3) {
          btn.style.transform = 'translateX(-50%) scale(0.95)';
          setTimeout(() => btn.style.transform = 'translateX(-50%) scale(1)', 100);
          return;
        }

        document.body.classList.add('light-mode');
        btn.remove();
        canvas.remove();
        title.textContent = "The Light.";
        subtitle.textContent = "What was hidden is revealed.";
        input.classList.remove('hidden');
        input.focus();
        
        const clue = document.createElement('div');
        clue.className = 'hidden-clue';
        clue.textContent = atob('VGhlIGZpbmFsIHdvcmQgaXM6IGlsbHVtaW5hdGlvbg==');
        document.body.appendChild(clue);
        setTimeout(() => clue.style.opacity = 1, 100);
      });
      
      document.body.appendChild(btn);
    }
  });

  setTimeout(() => {
    title.textContent = "The Void.";
    subtitle.textContent = "Find the spark.";
    title.style.transition = 'opacity 3s ease';
    subtitle.style.transition = 'opacity 3s ease';
    title.style.opacity = '1';
    subtitle.style.opacity = '1';
  }, isTransition ? 3000 : 100);
}

// Subtle console initialization
setTimeout(() => {
  console.log('%c[TEST]%c initialized', 'color:#8b7355;font-weight:bold;', 'color:#444;');
}, 2000);

window.onload = () => {
  initPhase();
  if (!input.classList.contains('hidden')) input.focus();
};
document.addEventListener('click', () => {
  if (!input.classList.contains('hidden')) input.focus();
});
</script>

  <button onclick="document.getElementById('flashlight-overlay').style.background = 'none';" style="font-size: 10px; color: #666; background: transparent; border: 1px solid #666; padding: 4px; cursor: pointer;">[DEV] Big Torch</button>
  <button onclick="localStorage.clear(); window.location.reload();" style="font-size: 10px; color: #666; background: transparent; border: 1px solid #666; padding: 4px; cursor: pointer;">[DEV] Reset Progress</button>
</div>
